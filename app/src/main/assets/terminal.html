<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="js/xterm.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1C1917; }
  #terminal {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
  }
</style>
</head>
<body>
<div id="terminal"></div>
<script src="js/xterm.min.js"></script>
<script src="js/addon-fit.min.js"></script>
<script>
var term = null;
var fitAddon = null;
var writeCount = 0;

window.onerror = function(msg, url, line) {
  document.title = 'ERR: ' + msg;
};

try {
  term = new Terminal({
    theme: {
      background: '#1C1917',
      foreground: '#EAE1D9',
      cursor: '#E8A66E',
      cursorAccent: '#1C1917',
      selectionBackground: '#E8A66E44',
      black: '#1C1917', red: '#FF6B6B', green: '#87C38A', yellow: '#E8A66E',
      blue: '#7AAED8', magenta: '#C4A7E7', cyan: '#7DC4C4', white: '#EAE1D9',
      brightBlack: '#52463A', brightRed: '#FF9B9B', brightGreen: '#A8D8AB',
      brightYellow: '#F5C98E', brightBlue: '#9EC5E8', brightMagenta: '#D8C4F0',
      brightCyan: '#A0DEDE', brightWhite: '#FFFFFF'
    },
    fontFamily: 'monospace',
    fontSize: 13,
    lineHeight: 1.15,
    scrollback: 5000,
    cursorBlink: true,
    cursorStyle: 'block',
    convertEol: false
  });

  fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.open(document.getElementById('terminal'));

  function doFit() {
    try { fitAddon.fit(); } catch(e) {}
  }

  doFit();
  setTimeout(doFit, 100);
  setTimeout(doFit, 300);
  setTimeout(doFit, 600);
  setTimeout(doFit, 1000);
  setTimeout(doFit, 2000);
  setTimeout(doFit, 3000);
  window.addEventListener('resize', doFit);
  new ResizeObserver(doFit).observe(document.getElementById('terminal'));

  term.onData(function(data) {
    if (window.AndroidBridge) window.AndroidBridge.onTerminalInput(data);
  });

  if (window.AndroidBridge) window.AndroidBridge.onTerminalReady();
} catch(e) {
  document.title = 'INIT ERR: ' + e.message;
}

function b64ToUtf8(b64) {
  var binStr = atob(b64);
  var bytes = new Uint8Array(binStr.length);
  for (var i = 0; i < binStr.length; i++) {
    bytes[i] = binStr.charCodeAt(i);
  }
  return new TextDecoder('utf-8').decode(bytes);
}

window.writeBase64 = function(b64) {
  try {
    var raw = b64ToUtf8(b64);
    writeCount++;
    term.write(raw);
    // Re-fit on first writes to pick up correct dimensions
    if (writeCount <= 3) setTimeout(doFit, 50);
  } catch(e) {}
};

window.clearTerminal = function() { if (term) term.clear(); };
window.doResize = function() { doFit(); };
</script>
</body>
</html>
