<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="js/xterm.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1C1917; }
  #terminal { width: 100%; height: 100%; }
  .xterm { padding: 4px; }
  #debug { position: fixed; top: 0; left: 0; color: #E8A66E; font-size: 10px;
            font-family: monospace; z-index: 9999; padding: 2px 4px;
            background: rgba(0,0,0,0.8); pointer-events: none; }
</style>
</head>
<body>
<div id="debug">loading...</div>
<div id="terminal"></div>
<script>
var dbg = document.getElementById('debug');
function log(msg) {
  dbg.textContent = msg;
  if (window.AndroidBridge) window.AndroidBridge.onTerminalReady();
}
window.onerror = function(msg, url, line) { log('ERR: ' + msg + ' L' + line); };
</script>
<script src="js/xterm.min.js"></script>
<script src="js/addon-fit.min.js"></script>
<script>
log('scripts loaded');

try {
  var term = new Terminal({
    theme: {
      background: '#1C1917',
      foreground: '#EAE1D9',
      cursor: '#E8A66E',
      cursorAccent: '#1C1917',
      selectionBackground: '#E8A66E44',
      black: '#1C1917',
      red: '#FF6B6B',
      green: '#87C38A',
      yellow: '#E8A66E',
      blue: '#7AAED8',
      magenta: '#C4A7E7',
      cyan: '#7DC4C4',
      white: '#EAE1D9',
      brightBlack: '#52463A',
      brightRed: '#FF9B9B',
      brightGreen: '#A8D8AB',
      brightYellow: '#F5C98E',
      brightBlue: '#9EC5E8',
      brightMagenta: '#D8C4F0',
      brightCyan: '#A0DEDE',
      brightWhite: '#FFFFFF'
    },
    fontFamily: 'monospace',
    fontSize: 13,
    lineHeight: 1.15,
    scrollback: 5000,
    cursorBlink: true,
    cursorStyle: 'block',
    convertEol: false
  });

  var fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);

  term.open(document.getElementById('terminal'));

  function doFit() {
    try { fitAddon.fit(); } catch(e) {}
  }
  doFit();
  window.addEventListener('resize', doFit);
  new ResizeObserver(doFit).observe(document.getElementById('terminal'));

  var writeCount = 0;

  // Called from Android — receives base64-encoded data
  window.writeBase64 = function(b64) {
    try {
      var raw = atob(b64);
      term.write(raw);
      writeCount++;
      log('ok: ' + writeCount + ' writes, last ' + raw.length + 'b');
    } catch(e) {
      log('write err: ' + e.message);
    }
  };

  // Fallback: plain string (for simple data)
  window.writeData = function(data) {
    term.write(data);
    writeCount++;
    log('ok: ' + writeCount + ' writes');
  };

  window.clearTerminal = function() { term.clear(); };
  window.getSize = function() {
    return JSON.stringify({ cols: term.cols, rows: term.rows });
  };

  term.onData(function(data) {
    if (window.AndroidBridge) window.AndroidBridge.onTerminalInput(data);
  });

  log('ready, cols=' + term.cols + ' rows=' + term.rows);
  dbg.style.display = 'none';

} catch(e) {
  log('INIT ERR: ' + e.message);
}
</script>
</body>
</html>
