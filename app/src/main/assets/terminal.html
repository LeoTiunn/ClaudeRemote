<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1C1917; }
  #terminal { width: 100%; height: 100%; }
  .xterm { padding: 4px; }
</style>
</head>
<body>
<div id="terminal"></div>
<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
<script>
const term = new Terminal({
  theme: {
    background: '#1C1917',
    foreground: '#EAE1D9',
    cursor: '#E8A66E',
    cursorAccent: '#1C1917',
    selectionBackground: '#E8A66E44',
    black: '#1C1917',
    red: '#FF6B6B',
    green: '#87C38A',
    yellow: '#E8A66E',
    blue: '#7AAED8',
    magenta: '#C4A7E7',
    cyan: '#7DC4C4',
    white: '#EAE1D9',
    brightBlack: '#52463A',
    brightRed: '#FF9B9B',
    brightGreen: '#A8D8AB',
    brightYellow: '#F5C98E',
    brightBlue: '#9EC5E8',
    brightMagenta: '#D8C4F0',
    brightCyan: '#A0DEDE',
    brightWhite: '#FFFFFF'
  },
  fontFamily: '"Cascadia Code", "Fira Code", "JetBrains Mono", "SF Mono", Menlo, monospace',
  fontSize: 13,
  lineHeight: 1.15,
  scrollback: 5000,
  cursorBlink: true,
  cursorStyle: 'block',
  allowProposedApi: true,
  convertEol: false
});

const fitAddon = new FitAddon.FitAddon();
term.loadAddon(fitAddon);

const webLinksAddon = new WebLinksAddon.WebLinksAddon();
term.loadAddon(webLinksAddon);

term.open(document.getElementById('terminal'));

// Fit to container
function doFit() {
  try { fitAddon.fit(); } catch(e) {}
}
doFit();
window.addEventListener('resize', doFit);

// Observe container size changes
new ResizeObserver(doFit).observe(document.getElementById('terminal'));

// Called from Android to write terminal data
function writeData(data) {
  term.write(data);
}

// Called from Android to clear terminal
function clearTerminal() {
  term.clear();
}

// Called from Android to get terminal dimensions
function getSize() {
  return JSON.stringify({ cols: term.cols, rows: term.rows });
}

// Notify Android when user types (for future use)
term.onData(function(data) {
  if (window.AndroidBridge) {
    window.AndroidBridge.onTerminalInput(data);
  }
});

// Signal ready
if (window.AndroidBridge) {
  window.AndroidBridge.onTerminalReady();
}
</script>
</body>
</html>
