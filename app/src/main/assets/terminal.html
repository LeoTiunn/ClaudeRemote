<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="js/xterm.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1C1917; }
  #terminal {
    position: absolute;
    top: 28px; left: 0; right: 0; bottom: 0;
  }
  .xterm, .xterm-viewport, .xterm-screen {
    width: 100% !important;
    height: 100% !important;
  }
  #status {
    position: absolute; top: 0; left: 0; right: 0; height: 28px;
    color: #FFFFFF; font-size: 12px; font-family: monospace;
    padding: 4px 8px; background: #FF0000; z-index: 9999;
    overflow: hidden;
  }
</style>
</head>
<body>
<div id="status">init...</div>
<div id="terminal"></div>
<script>
var statusEl = document.getElementById('status');
var terminalEl = document.getElementById('terminal');
var term = null;
var fitAddon = null;
var writeCount = 0;

function setStatus(msg) {
  statusEl.textContent = msg;
}

window.onerror = function(msg, url, line) {
  setStatus('ERR: ' + msg + ' L' + line);
};
</script>
<script src="js/xterm.min.js"></script>
<script src="js/addon-fit.min.js"></script>
<script>
try {
  term = new Terminal({
    theme: {
      background: '#1C1917',
      foreground: '#EAE1D9',
      cursor: '#E8A66E',
      cursorAccent: '#1C1917',
      selectionBackground: '#E8A66E44',
      black: '#1C1917', red: '#FF6B6B', green: '#87C38A', yellow: '#E8A66E',
      blue: '#7AAED8', magenta: '#C4A7E7', cyan: '#7DC4C4', white: '#EAE1D9',
      brightBlack: '#52463A', brightRed: '#FF9B9B', brightGreen: '#A8D8AB',
      brightYellow: '#F5C98E', brightBlue: '#9EC5E8', brightMagenta: '#D8C4F0',
      brightCyan: '#A0DEDE', brightWhite: '#FFFFFF'
    },
    fontFamily: 'monospace',
    fontSize: 13,
    lineHeight: 1.15,
    scrollback: 5000,
    cursorBlink: true,
    cursorStyle: 'block',
    convertEol: false
  });

  fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.open(terminalEl);

  function doFit() {
    try {
      fitAddon.fit();
      setStatus('cols=' + term.cols + ' rows=' + term.rows + ' w=' + terminalEl.offsetWidth + ' h=' + terminalEl.offsetHeight + ' writes=' + writeCount);
    } catch(e) {
      setStatus('fit err: ' + e.message);
    }
  }

  // Fit now and repeatedly to catch layout changes
  doFit();
  setTimeout(doFit, 100);
  setTimeout(doFit, 500);
  setTimeout(doFit, 1000);
  setTimeout(doFit, 2000);
  window.addEventListener('resize', doFit);
  new ResizeObserver(doFit).observe(terminalEl);

  term.onData(function(data) {
    if (window.AndroidBridge) window.AndroidBridge.onTerminalInput(data);
  });

  if (window.AndroidBridge) window.AndroidBridge.onTerminalReady();
} catch(e) {
  setStatus('INIT ERR: ' + e.message);
}

// Decode base64 to proper UTF-8 string
function b64ToUtf8(b64) {
  var binStr = atob(b64);
  var bytes = new Uint8Array(binStr.length);
  for (var i = 0; i < binStr.length; i++) {
    bytes[i] = binStr.charCodeAt(i);
  }
  return new TextDecoder('utf-8').decode(bytes);
}

// Called from Android
window.writeBase64 = function(b64) {
  try {
    var raw = b64ToUtf8(b64);
    writeCount++;
    term.write(raw);
    // Re-fit on first few writes in case layout wasn't ready
    if (writeCount <= 3) {
      setTimeout(function() {
        try { fitAddon.fit(); } catch(e) {}
        setStatus('cols=' + term.cols + ' rows=' + term.rows + ' w=' + terminalEl.offsetWidth + ' h=' + terminalEl.offsetHeight + ' writes=' + writeCount);
      }, 50);
    }
    if (writeCount % 50 === 0) {
      setStatus('cols=' + term.cols + ' rows=' + term.rows + ' writes=' + writeCount);
    }
  } catch(e) {
    setStatus('write err: ' + e.message);
  }
};

window.clearTerminal = function() { if (term) term.clear(); };
</script>
</body>
</html>
