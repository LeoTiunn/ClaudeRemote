name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug
        working-directory: android

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest
        working-directory: android

      - name: Upload Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/*.apk

      - name: Create release and upload APK
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: android
        run: |
          # Read version from build.gradle.kts
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG="v${VERSION}"
          APK_PATH=$(ls app/build/outputs/apk/debug/*.apk | head -1)
          COMMIT_MSG=$(git log -1 --pretty=%s)

          # Create release if it doesn't exist, then upload APK
          if gh release view "$TAG" > /dev/null 2>&1; then
            gh release upload "$TAG" "$APK_PATH" --clobber
          else
            gh release create "$TAG" "$APK_PATH" --title "$TAG — $COMMIT_MSG" --latest --notes "Automated release from CI"
          fi
