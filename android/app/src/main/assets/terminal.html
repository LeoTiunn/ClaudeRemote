<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="js/xterm.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1C1917; }
  #terminal {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
  }
  /* Force text rendering instead of emoji for Unicode symbols */
  .xterm-rows {
    font-variant-emoji: text !important;
    text-rendering: optimizeLegibility !important;
  }
  .xterm-rows span {
    font-variant-emoji: text !important;
  }
  /* GPU-accelerated smooth scroll on viewport */
  .xterm-viewport {
    -webkit-overflow-scrolling: touch !important;
    will-change: scroll-position;
  }
</style>
</head>
<body>
<div id="terminal"></div>
<script src="js/xterm.min.js"></script>
<script src="js/addon-fit.min.js"></script>
<script>
var term = null;
var fitAddon = null;
var writeCount = 0;
var lastCols = 0;
var lastRows = 0;
var lastWidthPx = 0;
var lastHeightPx = 0;

// Scroll-aware write buffering: pause writes while user is scrolling
var isUserScrolling = false;
var writeBuffer = [];
var flushTimer = null;

window.onerror = function(msg, url, line) {
  document.title = 'ERR: ' + msg;
};

try {
  term = new Terminal({
    theme: {
      background: '#1C1917',
      foreground: '#EAE1D9',
      cursor: '#E8A66E',
      cursorAccent: '#1C1917',
      selectionBackground: '#E8A66E44',
      black: '#1C1917', red: '#FF6B6B', green: '#87C38A', yellow: '#E8A66E',
      blue: '#7AAED8', magenta: '#C4A7E7', cyan: '#7DC4C4', white: '#EAE1D9',
      brightBlack: '#52463A', brightRed: '#FF9B9B', brightGreen: '#A8D8AB',
      brightYellow: '#F5C98E', brightBlue: '#9EC5E8', brightMagenta: '#D8C4F0',
      brightCyan: '#A0DEDE', brightWhite: '#FFFFFF'
    },
    fontFamily: '"Noto Sans Mono", "Droid Sans Mono", monospace',
    fontSize: 13,
    lineHeight: 1.15,
    scrollback: 10000,
    cursorBlink: true,
    cursorStyle: 'block',
    convertEol: false,
    scrollOnUserInput: true
  });

  fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.open(document.getElementById('terminal'));

  function notifySize(cols, rows) {
    if (cols !== lastCols || rows !== lastRows) {
      lastCols = cols;
      lastRows = rows;
      if (window.AndroidBridge) {
        window.AndroidBridge.onTerminalResize(cols, rows);
      }
    }
  }

  // Manual resize from Android pixel dimensions
  window.setTermSize = function(widthPx, heightPx) {
    lastWidthPx = widthPx;
    lastHeightPx = heightPx;
    var cols, rows;
    try {
      var core = term._core;
      var cellW = core._renderService.dimensions.css.cell.width;
      var cellH = core._renderService.dimensions.css.cell.height;
      if (cellW > 0 && cellH > 0) {
        cols = Math.floor(widthPx / cellW);
        rows = Math.floor(heightPx / cellH);
      }
    } catch(e) {}

    // Fallback
    if (!cols || !rows || cols < 10 || rows < 3) {
      cols = Math.floor(widthPx / 8);
      rows = Math.floor(heightPx / 16);
    }

    if (cols > 10 && rows > 3) {
      try {
        term.resize(cols, rows);
        notifySize(cols, rows);
      } catch(e) {}
    }
  };

  // Touch scroll with write buffering
  // Re-acquires viewport reference each touchstart to survive WebView resume
  (function() {
    var el = document.getElementById('terminal');
    var viewport = null;
    var lastY = null;
    var velocity = 0;
    var lastTime = 0;
    var momentumId = null;
    var scrollMultiplier = 1.8;

    function getViewport() {
      viewport = document.querySelector('.xterm-viewport');
      return viewport;
    }

    function flushWriteBuffer() {
      isUserScrolling = false;
      if (writeBuffer.length > 0) {
        var combined = writeBuffer.join('');
        writeBuffer = [];
        term.write(combined);
      }
      term.scrollToBottom();
    }

    el.addEventListener('touchstart', function(e) {
      getViewport();
      if (momentumId) { cancelAnimationFrame(momentumId); momentumId = null; }
      if (flushTimer) { clearTimeout(flushTimer); flushTimer = null; }
      velocity = 0;
      isUserScrolling = true;
      if (e.touches.length === 1) {
        lastY = e.touches[0].clientY;
        lastTime = Date.now();
      }
    }, { passive: true });

    el.addEventListener('touchmove', function(e) {
      if (!viewport || lastY === null || e.touches.length !== 1) return;
      e.preventDefault();
      var y = e.touches[0].clientY;
      var dy = (lastY - y) * scrollMultiplier;
      var now = Date.now();
      var dt = now - lastTime;
      if (dt > 0) velocity = velocity * 0.4 + (dy / dt) * 0.6;
      lastY = y;
      lastTime = now;
      viewport.scrollTop += dy;
    }, { passive: false });

    el.addEventListener('touchend', function() {
      lastY = null;
      if (viewport && Math.abs(velocity) > 0.15) {
        var v = velocity * 20;
        var friction = 0.96;
        function momentum() {
          v *= friction;
          if (Math.abs(v) < 0.3) {
            flushTimer = setTimeout(flushWriteBuffer, 3000);
            return;
          }
          viewport.scrollTop += v;
          momentumId = requestAnimationFrame(momentum);
        }
        momentumId = requestAnimationFrame(momentum);
      } else {
        flushTimer = setTimeout(flushWriteBuffer, 3000);
      }
    }, { passive: true });
  })();

  term.onData(function(data) {
    if (window.AndroidBridge) window.AndroidBridge.onTerminalInput(data);
  });

  if (window.AndroidBridge) window.AndroidBridge.onTerminalReady();
} catch(e) {
  document.title = 'INIT ERR: ' + e.message;
}

function b64ToUtf8(b64) {
  var binStr = atob(b64);
  var bytes = new Uint8Array(binStr.length);
  for (var i = 0; i < binStr.length; i++) {
    bytes[i] = binStr.charCodeAt(i);
  }
  return new TextDecoder('utf-8').decode(bytes);
}

window.writeBase64 = function(b64) {
  try {
    var raw = b64ToUtf8(b64);
    writeCount++;
    if (isUserScrolling) {
      writeBuffer.push(raw);
    } else {
      term.write(raw);
    }
  } catch(e) {}
};

window.clearTerminal = function() { if (term) term.clear(); };

window.setFontSize = function(size) {
  if (term && size > 0) {
    term.options.fontSize = size;
    if (lastWidthPx > 0 && lastHeightPx > 0) {
      window.setTermSize(lastWidthPx, lastHeightPx);
    }
  }
};

window.setThemeDark = function(isDark) {
  if (!term) return;
  var bg, fg;
  if (isDark) {
    bg = '#1C1917'; fg = '#EAE1D9';
    term.options.theme = {
      background: bg, foreground: fg,
      cursor: '#E8A66E', cursorAccent: bg,
      selectionBackground: '#E8A66E44',
      black: '#1C1917', red: '#FF6B6B', green: '#87C38A', yellow: '#E8A66E',
      blue: '#7AAED8', magenta: '#C4A7E7', cyan: '#7DC4C4', white: '#EAE1D9',
      brightBlack: '#52463A', brightRed: '#FF9B9B', brightGreen: '#A8D8AB',
      brightYellow: '#F5C98E', brightBlue: '#9EC5E8', brightMagenta: '#D8C4F0',
      brightCyan: '#A0DEDE', brightWhite: '#FFFFFF'
    };
  } else {
    bg = '#FFF8F4'; fg = '#1F1B16';
    term.options.theme = {
      background: bg, foreground: fg,
      cursor: '#BF5B21', cursorAccent: bg,
      selectionBackground: '#BF5B2144',
      black: '#1F1B16', red: '#BA1A1A', green: '#2E6B30', yellow: '#BF5B21',
      blue: '#3A6EA5', magenta: '#7B5EA7', cyan: '#2A7B7B', white: '#FFF8F4',
      brightBlack: '#504539', brightRed: '#FF6B6B', brightGreen: '#87C38A',
      brightYellow: '#E8A66E', brightBlue: '#7AAED8', brightMagenta: '#C4A7E7',
      brightCyan: '#7DC4C4', brightWhite: '#FFFFFF'
    };
  }
  document.body.style.background = bg;
};
</script>
</body>
</html>
